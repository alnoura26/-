<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qari Guesser</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            400: '#f7cf56',
                            500: '#f1b321',
                            600: '#d99214',
                        },
                        emerald: {
                            900: '#022c22',
                            950: '#010806',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #022c22 0%, #010604 100%);
            -webkit-tap-highlight-color: transparent;
        }
        .text-glow {
            text-shadow: 0 0 12px rgba(241, 179, 33, 0.4);
        }
        .custom-card {
            background: rgba(1, 12, 9, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(241, 179, 33, 0.15);
        }
        .fade-in {
            animation: fadeIn 0.35s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .wave-bar {
            animation: bounce 1.2s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            10% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.3s; }
        .wave-bar:nth-child(4) { animation-delay: 0.5s; }
        .wave-bar:nth-child(5) { animation-delay: 0.2s; }
        .wave-bar:nth-child(6) { animation-delay: 0.4s; }
    </style>
</head>
<body class="text-slate-200 flex flex-col min-h-screen justify-center items-center p-4 selection:bg-gold-500/30">

    <main class="w-full max-w-md mx-auto flex flex-col items-center gap-6 my-auto z-10">
        
        <!-- Question Counter -->
        <div class="custom-card rounded-full px-5 py-1.5 text-center border-gold-500/15 shadow-md">
            <span id="qnNum" class="text-base font-bold text-gold-400 text-glow tracking-widest">1 / 7</span>
        </div>

        <!-- Card Container -->
        <div id="gameCard" class="custom-card w-full rounded-3xl p-6 sm:p-8 flex flex-col items-center shadow-2xl relative min-h-[420px] justify-center">
            
            <!-- STATE 1: RECITATION SCREEN -->
            <div id="recitationState" class="w-full flex flex-col items-center gap-8 fade-in">
                
                <div class="w-full flex flex-col items-center gap-4">
                    <div class="relative w-40 h-40 rounded-full bg-gradient-to-tr from-emerald-950 to-emerald-900 border border-gold-500/20 flex items-center justify-center shadow-inner group">
                        <div id="discSpinner" class="absolute inset-2 rounded-full border border-dashed border-gold-500/5 pointer-events-none"></div>

                        <!-- Equalizer Animation -->
                        <div id="waveContainer" class="flex items-end justify-center gap-1.5 h-10 w-20 opacity-0 transition-opacity duration-300">
                            <span class="wave-bar w-1.5 h-5 bg-gold-400 rounded-full origin-bottom"></span>
                            <span class="wave-bar w-1.5 h-8 bg-gold-500 rounded-full origin-bottom"></span>
                            <span class="wave-bar w-1.5 h-10 bg-amber-500 rounded-full origin-bottom"></span>
                            <span class="wave-bar w-1.5 h-7 bg-gold-500 rounded-full origin-bottom"></span>
                            <span class="wave-bar w-1.5 h-4 bg-gold-300 rounded-full origin-bottom"></span>
                        </div>

                        <!-- Play/Pause trigger -->
                        <button id="playBtn" onclick="toggleAudio()" class="absolute inset-0 flex items-center justify-center rounded-full bg-black/5 hover:bg-black/20 transition focus:outline-none">
                            <span id="playIcon" class="w-16 h-16 rounded-full bg-gold-500 hover:bg-gold-400 text-emerald-950 flex items-center justify-center shadow-md transition-transform transform group-hover:scale-105 active:scale-95">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </span>
                        </button>
                        
                        <!-- Loading Indicator -->
                        <div id="audioLoading" class="hidden absolute inset-0 bg-emerald-950/90 rounded-full flex items-center justify-center">
                            <svg class="animate-spin h-8 w-8 text-gold-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </div>

                    <div class="text-center mt-2">
                        <p id="playerStatus" class="text-xs font-semibold text-gold-300 uppercase tracking-widest">Tap to play recitation</p>
                    </div>
                </div>

                <!-- Reveal Arrow Button -->
                <div class="w-full flex justify-center">
                    <button onclick="revealQari()" class="w-14 h-14 bg-gradient-to-tr from-gold-500 to-amber-600 hover:from-gold-400 hover:to-amber-500 text-emerald-950 rounded-full flex items-center justify-center shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95 border border-gold-400/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- STATE 2: ANSWER SCREEN (With MUCH LARGER Qari Image) -->
            <div id="revealState" class="w-full hidden flex flex-col items-center gap-6 text-center fade-in">
                
                <div class="flex flex-col items-center justify-center p-6 w-full rounded-2xl bg-emerald-950/30 border border-gold-500/10 min-h-[300px]">
                    <!-- Large Qari Image Holder (Made larger and styled beautifully with modern squircle rounded borders) -->
                    <div class="w-44 h-44 sm:w-52 sm:h-52 rounded-3xl border-2 border-gold-500/30 overflow-hidden mb-5 shadow-2xl bg-emerald-900/60 flex items-center justify-center relative">
                        <img id="qariImage" src="" alt="Qari" class="w-full h-full object-cover hidden" onload="this.classList.remove('hidden'); document.getElementById('qariImageFallback').classList.add('hidden');" onerror="this.classList.add('hidden'); document.getElementById('qariImageFallback').classList.remove('hidden');">
                        <!-- Modern Mosque Fallback Icon instead of simple mark -->
                        <div id="qariImageFallback" class="flex flex-col items-center gap-2 text-gold-500/70">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                            <span class="text-xs uppercase tracking-widest font-bold text-gold-500/50">Qari Portrait</span>
                        </div>
                    </div>

                    <!-- Clean English Name Output -->
                    <h4 id="revealQariName" class="text-xl sm:text-2xl font-extrabold text-gold-400 tracking-wide leading-tight"></h4>
                    
                    <div class="flex items-center gap-2 mt-2 text-xs text-emerald-400/90 font-medium">
                        <span id="revealFlag" class="text-lg"></span>
                        <span id="revealCountry" class="tracking-wider uppercase text-[11px]"></span>
                    </div>
                </div>

                <!-- Small Next Arrow Button -->
                <div class="w-full flex justify-center mt-2">
                    <button onclick="nextQuestion()" class="w-12 h-12 bg-gradient-to-tr from-emerald-600 to-teal-500 text-white rounded-full flex items-center justify-center shadow-md transition transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95 border border-emerald-400/20" title="Next Question">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
    
            </div>
            

        </div>
    </main>

    <!-- Completion Modal -->
    <div id="completionModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md hidden">
        <div class="custom-card max-w-sm w-full rounded-3xl p-8 text-center border-gold-500/15 shadow-2xl">
            <div class="w-16 h-16 bg-gradient-to-tr from-gold-500 to-amber-600 rounded-2xl shadow-md flex items-center justify-center text-2xl mx-auto mb-4">🏆</div>
            <h2 class="text-xl font-bold text-gold-400">!الحمد لله</h2>
            <p class="text-slate-400 my-4 text-xs leading-relaxed">All recitations have been completed successfully.</p>
            <button onclick="resetGame()" class="w-full py-3 bg-gradient-to-r from-gold-500 to-amber-600 text-emerald-950 font-bold text-sm rounded-xl tracking-wider active:scale-95 transition">RESTART</button>
        </div>
        <p class="mt-6 text-center text-[8px] sm:text-[9px] text-white/15 tracking-widest select-none">
    تم التطوير بواسطة المطور المحترف شادل
        </p>
    </div>

    <audio id="mainAudio" preload="auto"></audio>

    <script>
        // Corrected dataset with accurate flags
        const qariDataset = [
            { id: "1", name: " Mishary Alafasy", country: "Kuwait", flag: "🇰🇼" },
            { id: "2", name: "Yasser Al-Dosari", country: "Saudi Arabia", flag: "🇸🇦" },
            { id: "3", name: "Sheikh Abdul Rahman Al Ossi", country: "Saudi Arabia", flag: "🇸🇦" },
            { id: "4", name: "Mansour Al-Salimi", country: "Saudi Arabia", flag: "🇸🇦" },
            { id: "5", name: "Ahmad Nufais", country: "Kuwait", flag: "🇰🇼" },
            { id: "6", name: "Abdul Rahman Al-Sudais", country: "Saudi Arabia", flag: "🇸🇦" },
            { id: "7", name: "Muhammed Hani bin Hamza", country: "India", flag: "🇮🇳" }
        ];

        let currentIndex = 0;
        let audioContext = null;
        
        const audioEl = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');
        const discSpinner = document.getElementById('discSpinner');
        const waveContainer = document.getElementById('waveContainer');
        const playerStatus = document.getElementById('playerStatus');
        const audioLoading = document.getElementById('audioLoading');
        const recitationState = document.getElementById('recitationState');
        const revealState = document.getElementById('revealState');
        
        const qariImage = document.getElementById('qariImage');
        const qariImageFallback = document.getElementById('qariImageFallback');

        function initAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playClickSfx() {
            initAudioContext();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(580, audioContext.currentTime);
            gain.gain.setValueAtTime(0.08, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
            osc.start();
            osc.stop(audioContext.currentTime + 0.09);
        }

        function initGame() {
            currentIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            stopAudio();
            revealState.classList.add('hidden');
            recitationState.classList.remove('hidden');
            document.getElementById('qnNum').textContent = `${currentIndex + 1} / ${qariDataset.length}`;
            
            // Dynamic Audio Path matching: qari1.mp3, qari2.mp3...
            const currentQari = qariDataset[currentIndex];
            audioEl.src = `qari${currentQari.id}.mp3`;
            audioLoading.classList.add('hidden');
            playerStatus.textContent = "Tap to play recitation";
        }

        function toggleAudio() {
            initAudioContext();
            playClickSfx();
            if (audioEl.paused) {
                audioLoading.classList.remove('hidden');
                audioEl.play()
                    .then(() => {
                        audioLoading.classList.add('hidden');
                        playIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                        discSpinner.classList.add('animate-[spin_10s_linear_infinite]');
                        waveContainer.classList.remove('opacity-0');
                        playerStatus.textContent = "Playing Recitation...";
                    })
                    .catch(() => {
                        audioLoading.classList.add('hidden');
                        playerStatus.textContent = "Error loading audio.";
                    });
            } else {
                stopAudio();
            }
        }

        function stopAudio() {
            audioEl.pause();
            playIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            discSpinner.classList.remove('animate-[spin_10s_linear_infinite]');
            waveContainer.classList.add('opacity-0');
            playerStatus.textContent = "Tap to play recitation";
        }

        audioEl.onended = () => stopAudio();

        function revealQari() {
            stopAudio();
            const currentQari = qariDataset[currentIndex];
            
            // Update Text Details
            document.getElementById('revealQariName').textContent = currentQari.name;
            document.getElementById('revealFlag').textContent = currentQari.flag;
            document.getElementById('revealCountry').textContent = currentQari.country;

            // Load Image Path: qari1.jpg, qari2.jpg...
            qariImage.classList.add('hidden');
            qariImageFallback.classList.remove('hidden');
            qariImage.src = `qari${currentQari.id}.jpg`;

            recitationState.classList.add('hidden');
            revealState.classList.remove('hidden');
        }

        function nextQuestion() {
            playClickSfx();
            if (currentIndex < qariDataset.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                document.getElementById('completionModal').classList.remove('hidden');
            }
        }

        function resetGame() {
            document.getElementById('completionModal').classList.add('hidden');
            initGame();
        }

        window.onload = () => initGame();
    </script>
</body>
</html>
